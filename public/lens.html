<style>.sec .ctitle{font-size:18px;font-weight:600;color:var(--ink);margin:2px 0 4px}.sec .sdesc{font-size:14px;color:var(--muted);margin-bottom:10px}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}.fld{flex:1;min-width:90px}.fld label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:4px}.fld input{width:100%;font-size:15px;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:9px 8px;background:#fff;text-align:center}
.tbl{width:100%;border-collapse:collapse;font-size:14px;margin:8px 0}.tbl th,.tbl td{border:1px solid var(--line);padding:8px 10px}.tbl th{background:var(--surface);font-size:13px;color:var(--muted);font-weight:600}.tbl td:first-child{font-weight:600;width:46%}
.warn{font-size:13px;color:var(--warn);background:var(--warn-soft);border-radius:8px;padding:8px 11px;margin:8px 0}.note{font-size:13px;color:var(--muted);font-style:italic}</style></head><body>

<div class="wrap"><section class="view active">
<div class="lead"><div><div class="eyebrow">④ · 콘택트렌즈 측정</div><h2>각막곡률·직경 → BC·도수 산출</h2>
<div class="sub">각막곡률(K)·각막직경(HVID)·안경도수를 넣으면 권장 BC·직경·콘택트 도수(정점보정)를 산출. ODM 난이도 낮아 PB 먼저 추진 가능.</div></div><span class="pill good">● 측정 표준</span></div>
<div class="card pad sec"><div class="ctitle">입력</div>
<div class="row"><div class="fld"><label>각막곡률 K (mm)</label><input id="K" value="7.80" oninput="calc()"></div>
<div class="fld"><label>각막직경 HVID (mm)</label><input id="HV" value="11.8" oninput="calc()"></div>
<div class="fld"><label>안경 구면 (D)</label><input id="S" value="-5.00" oninput="calc()"></div>
<div class="fld"><label>정점거리 (mm)</label><input id="vd" value="12" oninput="calc()"></div></div></div>
<div class="card pad sec"><div class="ctitle">산출</div><div id="out"></div>
<div class="note">〔확인〕 근사식(BC≈K+0.0~0.1, 직경≈HVID+2~2.5, 고도수 정점보정). 실측·피팅 평가로 확정. 콘택트는 6세 이하 의사 처방 필수.</div></div>
</section></div>
<div class="foot"><span>BETTERVISION OS · 콘택트 측정 v0.1</span><span>측정 표준 · 본부 귀속</span></div>
<script>
function n(id){var x=parseFloat(document.getElementById(id).value);return isNaN(x)?0:x;}
function calc(){
 var K=n('K'),HV=n('HV'),S=n('S'),vd=n('vd');
 var bc=Math.round((K+0.05)*100)/100;           // 권장 BC (약간 플랫)
 var dia=Math.round((HV+2.2)*10)/10;            // 권장 직경
 var d=vd/1000; var cl=Math.round( (S/(1+d*S))*100)/100; // 안경→콘택트 정점보정
 var fit = Math.abs(S)>=4 ? '정점보정 적용(고도수)' : '보정 미미';
 var html='<table class="tbl">'+
  '<tr><th>항목</th><th>값</th></tr>'+
  '<tr><td>권장 베이스커브 BC</td><td>'+bc+' mm</td></tr>'+
  '<tr><td>권장 직경</td><td>'+dia+' mm</td></tr>'+
  '<tr><td>콘택트 도수(정점보정)</td><td>'+cl+' D <span style="color:var(--muted)">('+fit+')</span></td></tr>'+
  '<tr><td>안경 도수(참고)</td><td>'+S+' D @ '+vd+'mm</td></tr>'+
  '</table>';
 if(Math.abs(K-bc)>0.6) html+='<div class="warn">곡률·BC 차 큼 — 피팅 평가(무브먼트·센터링) 필수.</div>';
 document.getElementById('out').innerHTML=html;
}
calc();
</script></body></html>
