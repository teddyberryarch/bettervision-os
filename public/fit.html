<style>
.ex-presets{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 14px}
.ex-presets .chip{font-size:13px;font-weight:600;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:8px 12px;cursor:pointer}
.ex-presets .chip:hover{border-color:var(--ink)}
.prog{display:flex;gap:5px;margin:10px 0 16px}
.prog .pb{flex:1;height:5px;border-radius:9999px;background:var(--line)}
.prog .pb.on{background:var(--ink)} .prog .pb.done{background:var(--good)}
.ex-step .stitle{font-size:19px;font-weight:600;color:var(--ink);letter-spacing:-.3px;margin:2px 0 4px}
.ex-step .sdesc{font-size:14px;color:var(--muted);line-height:1.55;margin-bottom:12px}
.hint{font-size:13px;color:var(--good);background:var(--good-soft);border-radius:8px;padding:8px 11px;margin:8px 0}
.warn{font-size:13px;color:var(--warn);background:var(--warn-soft);border-radius:8px;padding:8px 11px;margin:8px 0}
.bad{font-size:13px;color:var(--bad);background:var(--bad-soft);border-radius:8px;padding:8px 11px;margin:8px 0}
.frow{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0}
.fld{flex:1;min-width:120px}
.fld label{display:block;font-size:13px;color:var(--muted);font-weight:600;margin-bottom:4px}
.fld input,.fld select{width:100%;font-family:var(--kr);font-size:15px;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:10px 11px;background:#fff}
.navbtns{display:flex;justify-content:space-between;gap:10px;margin-top:18px}
.kv{display:grid;grid-template-columns:150px 1fr;gap:6px 10px;font-size:14px;margin:8px 0}
.kv .k{color:var(--muted)} .kv .v{color:var(--ink);font-weight:600}
.calc{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin:10px 0}
.calc .big{font-size:22px;font-weight:700;color:var(--ink)}
.calc .sm{font-size:13px;color:var(--muted)}
.sheetwrap{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff;margin:10px 0}
.sheetwrap svg{display:block;width:100%;height:auto}
.printbtns{display:flex;gap:8px;margin:8px 0}
@media print{ .topbar,.foot,.ex-presets,.prog,.navbtns,.printbtns,.lead,.eyebrow{display:none!important}
  .wrap{max-width:none} .card{border:0;padding:0} body{background:#fff} }
</style>

<div class="foot"><span>BETTERVISION OS · 피팅 자동 시스템 v0.1</span><span>생산 고정 + 측정값 휨 지시</span></div>

<script src="/assets/bv-record.js"></script>
<script>
var F, idx;
function resetAll(){
  F={ // 검안·측정 입력
    name:'', faceW:'', earGap:'', noseH:'', faceWrap:'', pd:'', pdR:'', pdL:'', oh:'', ph:'', sphMax:'', vd:'12',
    // 프레임 선택
    material:'titan', frontA:'', dbl:'', templeLen:'', frameSpread:'', bridge:'adj',
    // 산출
  };
  var _r=(window.BVRecord&&BVRecord.load)?BVRecord.load():null;
  if(_r){ F.name=_r.name||F.name; if(_r.faceWidth)F.faceW=_r.faceWidth; if(_r.earGap)F.earGap=_r.earGap; if(_r.noseH)F.noseH=_r.noseH; if(_r.faceWrap!=null)F.faceWrap=_r.faceWrap; if(_r.pd)F.pd=_r.pd; if(_r.pdR)F.pdR=_r.pdR; if(_r.pdL)F.pdL=_r.pdL; if(_r.oh)F.oh=_r.oh; if(_r.rx&&_r.rx.vd)F.vd=_r.rx.vd; if(_r.sphMax!=null&&_r.sphMax!=="")F.sphMax=_r.sphMax; if(_r.rx){F.rxR=_r.rx.R;F.rxL=_r.rx.L;F.rxAdd=_r.rx.add;} }
  var _b=document.getElementById("fitbanner"); if(_b)_b.innerHTML=_r?BVRecord.banner(_r,"피팅"):"";
  idx=0; render();
}
var STEPS=['intake','size','splay','panto','vertex','nosepad','sheet'];
function cur(){return STEPS[idx];}
function num(v){var n=parseFloat(v);return isNaN(n)?null:n;}
function g(id){var e=document.getElementById(id);return e?e.value:'';}

/* 소재별 최대 벌림 조정폭 (mm) — 〔확인〕 초벌 */
var MAT={titan:{n:'티탄',adj:8},metal:{n:'금속',adj:6},tr:{n:'TR·울템',adj:4},acet:{n:'경질 아세테이트',adj:1}};
/* 다리벌림 오프셋: 유연(티탄·금속) −15, 반강성(TR) −12, 경질 −10 — 〔확인〕 */
function splayOffset(m){return (m==='titan'||m==='metal')?15:(m==='tr'?12:10);}

function render(){
  var prog=STEPS.map(function(s,i){return '<div class="pb '+(i<idx?'done':(i===idx?'on':''))+'"></div>';}).join('');
  document.getElementById('prog').innerHTML=prog;
  document.getElementById('stage').innerHTML=view(cur());
  document.getElementById('backBtn').style.visibility=idx===0?'hidden':'visible';
  document.getElementById('nextBtn').textContent=(cur()==='sheet')?'처음으로 ↺':'다음 →';
}

function view(id){
  if(id==='intake') return ''+
    '<div class="eyebrow">1 · 입력</div><div class="stitle">검안·측정값 + 프레임 선택</div>'+
    '<div class="sdesc">검안 시스템(exam)에서 넘어온 처방·PD·측정 5값을 불러오고, 고른 프레임을 지정한다.</div>'+
    '<div class="frow"><div class="fld"><label>고객</label><input id="f_name" value="'+F.name+'" placeholder="이름"></div>'+
      '<div class="fld"><label>PD (mm)</label><input id="f_pd" value="'+F.pd+'" placeholder="63"></div></div>'+
    '<div class="frow"><div class="fld"><label>단안 PD R</label><input id="f_pdR" value="'+F.pdR+'" placeholder="31.5"></div>'+
      '<div class="fld"><label>단안 PD L</label><input id="f_pdL" value="'+F.pdL+'" placeholder="31.5"></div>'+
      '<div class="fld"><label>동공높이 OH</label><input id="f_oh" value="'+F.oh+'" placeholder="22"></div></div>'+
    '<div class="sdesc" style="margin:8px 0 2px">측정 5값</div>'+
    '<div class="frow"><div class="fld"><label>얼굴 가로폭 (mm)</label><input id="f_faceW" value="'+F.faceW+'" placeholder="148"></div>'+
      '<div class="fld"><label>귀 윗부분 간격 (mm)</label><input id="f_earGap" value="'+F.earGap+'" placeholder="160"></div></div>'+
    '<div class="frow"><div class="fld"><label>코 높이 (mm)</label><input id="f_noseH" value="'+F.noseH+'" placeholder="12"></div>'+
      '<div class="fld"><label>안면각 wrap (°)</label><input id="f_faceWrap" value="'+F.faceWrap+'" placeholder="5"></div>'+
      '<div class="fld"><label>최대 |구면 S|</label><input id="f_sphMax" value="'+F.sphMax+'" placeholder="2.5"></div></div>'+
    '<div class="sdesc" style="margin:10px 0 2px">선택 프레임</div>'+
    '<div class="frow"><div class="fld"><label>소재</label><select id="f_mat">'+matOpts()+'</select></div>'+
      '<div class="fld"><label>브리지</label><select id="f_bridge"><option value="adj"'+(F.bridge==='adj'?' selected':'')+'>코받침 조정형</option><option value="fix"'+(F.bridge==='fix'?' selected':'')+'>일체형(아세테이트)</option></select></div></div>'+
    '<div class="frow"><div class="fld"><label>프론트 폭 a×2+DBL</label><input id="f_frontA" value="'+F.frontA+'" placeholder="138"></div>'+
      '<div class="fld"><label>기본 템플 간격(mm)</label><input id="f_spread" value="'+F.frameSpread+'" placeholder="138"></div>'+
      '<div class="fld"><label>템플 길이(mm)</label><input id="f_temple" value="'+F.templeLen+'" placeholder="145"></div></div>'+
    '<div class="hint">실제 시스템은 exam 결과+측정 DB에서 자동 로드. 지금은 수기/시나리오 프리셋.</div>';

  if(id==='size'){ var r=sizeCalc();
    return '<div class="eyebrow">2 · 9사이즈 매칭</div><div class="stitle">프론트 폭 × 템플 길이 → 핏 등급</div>'+
    '<div class="sdesc">생산은 9사이즈 고정. 측정값을 등급에 매칭하고 적합도를 본다. 모듈식이라 프론트·템플 등급이 독립.</div>'+
    '<div class="calc"><div class="big">'+r.code+'</div><div class="sm">프론트 '+r.fw+' · 템플 '+r.tw+' · 적합도 '+r.fit+'%</div></div>'+ r.note;
  }

  if(id==='splay'){ var r=splayCalc();
    return '<div class="eyebrow">3 · 다리벌림각</div><div class="stitle">목표 템플 간격 = 귀 간격 − 오프셋</div>'+
    '<div class="sdesc">측정 귀 간격으로 목표 템플 간격을 정하고, 프레임 기본값에서 얼마나 휠지 지시. 소재 한계 초과면 경고.</div>'+
    '<div class="calc"><div class="big">'+r.target+' mm</div><div class="sm">목표 템플 간격 (오프셋 −'+r.off+'mm · '+MAT[F.material].n+')</div></div>'+
    '<div class="kv"><div class="k">프레임 기본 간격</div><div class="v">'+(r.base!=null?r.base+'mm':'—')+'</div>'+
      '<div class="k">필요 조정량</div><div class="v">'+(r.adjNeed!=null?(r.adjNeed>0?'+':'')+r.adjNeed+'mm '+(r.adjNeed>0?'벌림':'좁힘'):'—')+'</div>'+
      '<div class="k">소재 최대 조정폭</div><div class="v">±'+MAT[F.material].adj+'mm</div></div>'+ r.note;
  }

  if(id==='panto'){ 
    return '<div class="eyebrow">4 · 판토스코픽 틸트</div><div class="stitle">렌즈 상하 기울기</div>'+
    '<div class="sdesc">표준 8~12°. 틀리면 비점수차(난시) 유발 → 도수 정확도 직결. 안면 기하로 목표각 제시.</div>'+
    '<div class="frow"><div class="fld"><label>목표 판토각 (°)</label><input id="p_panto" value="'+(F._panto||'10')+'"></div></div>'+
    '<div class="hint">초안 표준 8~12° (중앙 10°). 측면도 웨지로 휨 확인.</div>';
  }

  if(id==='vertex'){ var hi=(num(F.sphMax)>=4);
    return '<div class="eyebrow">5 · 정점간거리</div><div class="stitle">눈 ~ 렌즈 거리</div>'+
    '<div class="sdesc">표준 12mm, 짧을수록 좋음. 고도수일수록 중요 — 코받침·틸트로 맞춤.</div>'+
    '<div class="frow"><div class="fld"><label>목표 VD (mm)</label><input id="v_vd" value="'+(F.vd||'12')+'"></div></div>'+
    (hi?'<div class="warn">고도수(|S|≥4.00D) — VD를 표준보다 짧게(≈10~12mm) + 조제 단계 유효도수 환산.</div>':'<div class="hint">표준 12mm 유지.</div>');
  }

  if(id==='nosepad'){ var fix=(F.bridge==='fix');
    return '<div class="eyebrow">6 · 코받침</div><div class="stitle">수직 안착 + 정점거리</div>'+
    '<div class="sdesc">코 높이/각도/폭으로 코받침 높이·각도·간격 지시. 일체형 브리지는 조정 한계.</div>'+
    '<div class="frow"><div class="fld"><label>코받침 간격(mm)</label><input id="n_gap" value="'+(F._npGap||'')+'" placeholder="코폭 기반"></div>'+
      '<div class="fld"><label>코받침 각도(°)</label><input id="n_ang" value="'+(F._npAng||'')+'" placeholder="20"></div></div>'+
    (fix?'<div class="warn">일체형 브리지(아세테이트) — 코받침 조정 거의 0. 안착이 안 맞으면 다른 모델 권장.</div>':'<div class="hint">조정형 — 높이·각도·간격으로 안착·정점거리 동시 조정.</div>');
  }

  if(id==='sheet'){ collectAll(); return '<div class="eyebrow">7 · A4 피팅시트</div><div class="stitle">휨 지시서 + 1:1 도면 출력</div><div id="sheetbox"></div>'; }
  return '';
}
function matOpts(){var o='';for(var k in MAT){o+='<option value="'+k+'"'+(F.material===k?' selected':'')+'>'+MAT[k].n+'</option>';}return o;}

/* 계산 */
function band(v,lo,hi){ if(v==null)return '?'; if(v<lo)return 'S'; if(v>hi)return 'L'; return 'M'; }
function sizeCalc(){
  var fw=num(F.faceW), tl=num(F.earGap);
  // 〔확인〕 경계: 프론트폭 146/158mm, 템플 156/168mm (engine 설정과 동기)
  var fwB=band(fw,146,158), twB=band(tl,156,168);
  var fit = (fwB==='M'&&twB==='M')?96:(fwB==='M'||twB==='M')?88:80;
  var note=(fwB!=='?'&&twB!=='?'&&fwB!==twB)?'<div class="hint">독립 조합('+fwB+'·'+twB+') — 기성테가 못 맞추는 케이스. 모듈식이라 매칭 가능.</div>':'<div class="hint">측정값을 9사이즈 코드로 환산. 경계 mm값은 〔확인〕 초벌.</div>';
  return {code:fwB+'·'+twB, fw:fwB, tw:twB, fit:fit, note:note};
}
function splayCalc(){
  var eg=num(F.earGap), off=splayOffset(F.material), base=num(F.frameSpread);
  var target=(eg!=null)?(eg-off):null;
  var adjNeed=(target!=null&&base!=null)?Math.round((target-base)*10)/10:null;
  var note='';
  if(adjNeed!=null){
    if(Math.abs(adjNeed)>MAT[F.material].adj) note='<div class="bad">필요 조정량 '+Math.abs(adjNeed)+'mm > 소재 한계 ±'+MAT[F.material].adj+'mm — 이 테로는 못 맞춤. 다른 소재/모델 권장.</div>';
    else note='<div class="hint">조정 가능 범위 내. A4 시트에 목표 간격 두 점 찍어 거기 닿게 휨.</div>';
  }
  return {target:(target!=null?Math.round(target):'—'), off:off, base:base, adjNeed:adjNeed, note:note};
}

function collectAll(){
  // 입력 단계 값들은 각 단계 collect에서 이미 F에 반영됨
}
function collect(id){
  if(id==='intake'){F.name=g('f_name');F.pd=g('f_pd');F.pdR=g('f_pdR');F.pdL=g('f_pdL');F.oh=g('f_oh');F.faceW=g('f_faceW');F.earGap=g('f_earGap');F.noseH=g('f_noseH');F.faceWrap=g('f_faceWrap');F.sphMax=g('f_sphMax');F.material=g('f_mat');F.bridge=g('f_bridge');F.frontA=g('f_frontA');F.frameSpread=g('f_spread');F.templeLen=g('f_temple');}
  else if(id==='panto'){F._panto=g('p_panto');}
  else if(id==='vertex'){F.vd=g('v_vd');}
  else if(id==='nosepad'){F._npGap=g('n_gap');F._npAng=g('n_ang');}
}
function next(){ if(cur()==='sheet'){resetAll();return;} collect(cur()); if(idx<STEPS.length-1)idx++; render(); if(cur()==='sheet')buildSheet(); }
function back(){ collect(cur()); if(idx>0)idx--; render(); }

/* A4 피팅시트 SVG */
function buildSheet(){
  var sp=splayCalc(), sz=sizeCalc();
  function eyeRx(o){return (o&&o.S!==undefined&&o.S!=="")?((o.S||"")+" "+(o.C||"")+" "+(o.A||"")).trim():"—";}
  var target=(sp.target==='—')?138:sp.target;
  var panto=num(F._panto)||10, half=target/2;
  var cx=100, frontW=num(F.frontA)||138, fhalf=frontW/2;
  var pdT=num(F.pd)||63, monoR=num(F.pdR)||pdT/2, monoL=num(F.pdL)||pdT/2, oh=num(F.oh)||22;
  var dbl=18, a=Math.max(40,(frontW-dbl)/2), lensH=40, wrap=num(F.faceWrap)||0;
  var pL=cx-half, pR=cx+half;
  var lensTop=104, lensBot=lensTop+lensH;
  var lLcx=cx-(dbl/2)-(a/2), lRcx=cx+(dbl/2)+(a/2);
  var ocy=lensBot-oh, ocR_x=cx-monoR, ocL_x=cx+monoL;

  function qr(x,y,sz2){
    var n=8, c=sz2/(n+2), o=x+c, oy=y+c, g='';
    g+='<rect x="'+x+'" y="'+y+'" width="'+sz2+'" height="'+sz2+'" fill="#fff" stroke="#0d0d0c" stroke-width="0.4"/>';
    function fnd(fx,fy){return '<rect x="'+fx+'" y="'+fy+'" width="'+(c*3)+'" height="'+(c*3)+'" fill="none" stroke="#0d0d0c" stroke-width="0.6"/><rect x="'+(fx+c)+'" y="'+(fy+c)+'" width="'+c+'" height="'+c+'" fill="#0d0d0c"/>';}
